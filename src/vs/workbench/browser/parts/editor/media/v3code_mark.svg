<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 260" width="260" height="260">
  <defs>
    <linearGradient id="vgrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="55%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </linearGradient>
    <linearGradient id="threegrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4FF85"/>
      <stop offset="55%" stop-color="#9FFF3D"/>
      <stop offset="100%" stop-color="#5BC91D"/>
    </linearGradient>
    <filter id="v3glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="threeglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <style>
    @keyframes v3-three-pulse {
      0%, 100% { opacity: 0.92; filter: url(#threeglow); }
      50%      { opacity: 1;    filter: url(#threeglow) drop-shadow(0 0 8px #9FFF3D); }
    }
    .v3-three { animation: v3-three-pulse 2.4s ease-in-out infinite; transform-origin: 168px 130px; }
  </style>

  <g stroke="#8B5CF6" stroke-width="2" fill="none" opacity="0.75">
    <polyline points="20,52 20,20 52,20"/>
    <polyline points="208,20 240,20 240,52"/>
  </g>
  <g stroke="#7FE650" stroke-width="2" fill="none" opacity="0.75">
    <polyline points="240,208 240,240 208,240"/>
    <polyline points="52,240 20,240 20,208"/>
  </g>

  <g font-family="Consolas, 'JetBrains Mono', monospace" font-weight="900" text-anchor="middle">
    <text x="92" y="158" font-size="120" fill="url(#vgrad)" letter-spacing="-4" filter="url(#v3glow)">V</text>
    <text class="v3-three" x="168" y="158" font-size="120" fill="url(#threegrad)" letter-spacing="-4">3</text>
  </g>

  <line x1="60" y1="190" x2="200" y2="190" stroke="#8B5CF6" stroke-width="1.5" opacity="0.6"/>
  <circle cx="130" cy="190" r="3" fill="#7FE650"/>

  <text x="130" y="214" font-family="Consolas, monospace" font-size="11" fill="#9CA3AF"
        text-anchor="middle" letter-spacing="6">CONTEXT_BRIDGE</text>
</svg>
