<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-label="V3Code">
  <title>V3Code</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#0B1020"/>
      <stop offset="100%" stop-color="#07080C"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"   stop-color="#A78BFA"/>
      <stop offset="40%"  stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%"   stop-color="#7C3AED" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="256" height="256" rx="56" ry="56" fill="url(#bg)"/>
  <rect x="0" y="0" width="256" height="256" rx="56" ry="56" fill="url(#glow)"/>

  <!-- V mark — geometric chevron -->
  <g transform="translate(64 56)">
    <!-- Drop shadow layers for depth -->
    <polygon points="64,8 36,8 64,144 92,8" fill="#312E81" transform="translate(6 6)" opacity="0.7"/>
    <polygon points="64,8 36,8 64,144 92,8" fill="#312E81" transform="translate(3 3)" opacity="0.85"/>

    <!-- Main V shape — wider chevron -->
    <polygon points="64,4 28,4 64,148 100,4" fill="url(#mark)"/>

    <!-- Highlight/shine -->
    <polygon points="64,4 28,4 64,148 100,4" fill="url(#mark)" opacity="0.9"/>
    <polygon points="64,4 42,4 64,96 64,148" fill="white" opacity="0.12"/>

    <!-- Accent line through center -->
    <line x1="64" y1="28" x2="64" y2="128" stroke="#A78BFA" stroke-width="1.5" opacity="0.5"/>
  </g>

  <!-- Subtle corner glow -->
  <circle cx="200" cy="56" r="40" fill="#7C3AED" opacity="0.08"/>
</svg>
