<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 160" role="img" aria-label="V3">
  <title>V3</title>
  <defs>
    <linearGradient id="v3-front" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#A78BFA"/>
      <stop offset="55%"  stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#2563EB"/>
    </linearGradient>
    <linearGradient id="v3-back" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#312E81"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="v3-shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="0.55"/>
      <stop offset="60%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <!-- All geometry is pure paths — no font dependency. Renders pixel-identical
         on every machine, browser, image viewer, and Inkscape/Illustrator. -->
    <symbol id="v3-V" viewBox="0 0 130 130" overflow="visible">
      <path d="M 0 0 L 28 0 L 65 92 L 102 0 L 130 0 L 82 130 L 48 130 Z"/>
    </symbol>
    <symbol id="v3-3" viewBox="0 0 130 130" overflow="visible">
      <path d="M 4 16 C 22 -8, 110 -8, 122 28 C 130 60, 92 70, 70 70 C 92 70, 130 78, 122 110 C 110 144, 22 144, 4 118 L 30 102 C 38 120, 92 124, 96 100 C 98 80, 60 80, 50 80 L 50 60 C 60 60, 98 60, 96 40 C 92 16, 38 20, 30 38 Z"/>
    </symbol>

    <g id="v3-mark">
      <use href="#v3-V" x="0"   y="0" width="130" height="130"/>
      <use href="#v3-3" x="155" y="0" width="130" height="130"/>
    </g>
  </defs>

  <g transform="translate(17 15)">
    <use href="#v3-mark" fill="url(#v3-back)"  transform="translate(10 10)" opacity="0.85"/>
    <use href="#v3-mark" fill="url(#v3-back)"  transform="translate(7 7)"   opacity="0.9"/>
    <use href="#v3-mark" fill="url(#v3-back)"  transform="translate(4 4)"   opacity="0.95"/>
    <use href="#v3-mark" fill="url(#v3-front)"/>
    <use href="#v3-mark" fill="url(#v3-shine)"/>
  </g>
</svg>
