<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7FE650"/>
      <stop offset="100%" stop-color="#A3F56E"/>
    </linearGradient>
    <linearGradient id="g3" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#7FE650"/>
    </linearGradient>
  </defs>
  <!-- Dark rounded-rect background -->
  <rect width="1024" height="1024" rx="180" fill="#0B0D14"/>
  
  <!-- Left bar - purple, angled outward -->
  <g transform="translate(280,220) rotate(-20, 60, 380)">
    <rect x="0" y="80" width="100" height="500" rx="14" fill="url(#g1)" opacity="0.9"/>
    <!-- highlight face -->
    <rect x="22" y="40" width="78" height="500" rx="12" fill="url(#g1)" opacity="0.18"/>
  </g>
  
  <!-- Right bar - green, angled outward -->
  <g transform="translate(644,220) rotate(20, 60, 380)">
    <rect x="0" y="80" width="100" height="500" rx="14" fill="url(#g2)" opacity="0.9"/>
    <!-- highlight face -->
    <rect x="-4" y="55" width="78" height="500" rx="12" fill="url(#g2)" opacity="0.18"/>
  </g>
  
  <!-- Center vertical pillar - purple-to-green gradient -->
  <g transform="translate(462,220)">
    <rect x="0" y="80" width="100" height="500" rx="14" fill="url(#g3)" opacity="0.95"/>
    <!-- highlight face -->
    <rect x="10" y="20" width="80" height="500" rx="12" fill="url(#g3)" opacity="0.15"/>
  </g>
</svg>
